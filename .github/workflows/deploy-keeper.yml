name: Deploy Hyperbet Keeper

on:
  push:
    branches: [main]
    paths:
      - "packages/hyperbet-solana/keeper/**"
      - ".github/workflows/deploy-keeper.yml"
      - "docs/betting-production-deploy.md"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BETTING_KEEPER_URL: ${{ vars.HYPERBET_KEEPER_URL != '' && vars.HYPERBET_KEEPER_URL || 'https://gold-betting-keeper-production.up.railway.app' }}
  RAILWAY_PROJECT_ID: e5f5ba11-0380-4d71-aa0b-343d89a58c0d
  RAILWAY_PRODUCTION_ENVIRONMENT_ID: 194f3565-ba2f-4c98-87d2-85dfc3a5110b
  RAILWAY_KEEPER_SERVICE_ID: 330ea18e-b215-4cf9-9fe2-4bb09fc2ec63

jobs:
  deploy:
    name: Deploy hyperbet-solana keeper
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Detect keeper source changes
        id: keeper_changes
        run: |
          base_ref="${{ github.event.before }}"
          if [ -z "$base_ref" ] || [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          changed_files="$(git diff --name-only "$base_ref" "${{ github.sha }}" || true)"
          printf '%s\n' "$changed_files"

          keeper_source_changed=false
          if printf '%s\n' "$changed_files" | grep -Eq '^packages/hyperbet-solana/keeper/'; then
            keeper_source_changed=true
          fi

          echo "keeper_source_changed=${keeper_source_changed}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun install --cwd packages/hyperbet-solana/keeper --frozen-lockfile

      - name: Run keeper tests
        run: |
          bun test \
            packages/hyperbet-solana/keeper/src/walletKeys.test.ts \
            packages/hyperbet-solana/keeper/src/modelMarkets.test.ts \
            packages/hyperbet-solana/keeper/src/db.test.ts \
            packages/hyperbet-solana/keeper/src/perpsMath.test.ts

      - name: Smoke test keeper service
        run: |
          PORT=18080 \
          ENABLE_KEEPER_BOT=false \
          SOLANA_RPC_URL=https://api.mainnet-beta.solana.com \
          bun --bun packages/hyperbet-solana/keeper/src/service.ts >/tmp/betting-keeper.log 2>&1 &
          KEEPER_PID=$!
          trap 'kill "$KEEPER_PID" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18080/status | jq -e '.ok == true and .proxies != null' >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/betting-keeper.log
          exit 1

      - name: Install Railway CLI
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        run: bun add -g @railway/cli

      - name: Write Railway keeper context
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        working-directory: packages/hyperbet-solana/keeper
        run: |
          keeper_path="$(pwd)"
          mkdir -p "${HOME}/.railway"
          cat > "${HOME}/.railway/config.json" <<EOF
          {
            "projects": {
              "${keeper_path}": {
                "projectPath": "${keeper_path}",
                "name": "hyperscape",
                "project": "${RAILWAY_PROJECT_ID}",
                "environment": "${RAILWAY_PRODUCTION_ENVIRONMENT_ID}",
                "environmentName": "production",
                "service": "${RAILWAY_KEEPER_SERVICE_ID}"
              }
            },
            "user": {
              "token": "${RAILWAY_TOKEN}"
            }
          }
          EOF
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy keeper
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        working-directory: packages/hyperbet-solana/keeper
        run: |
          railway up . \
            --path-as-root \
            --detach \
            --service "${RAILWAY_KEEPER_SERVICE_ID}" \
            --environment "${RAILWAY_PRODUCTION_ENVIRONMENT_ID}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          CI: "true"

      - name: Verify keeper endpoints
        run: |
          for attempt in $(seq 1 20); do
            status_payload="$(curl -fsSL "${BETTING_KEEPER_URL}/status" || true)"
            if [ -n "$status_payload" ] && echo "$status_payload" | jq -e '.ok == true and .proxies.solanaRpc == true and .parsers != null' >/dev/null; then
              break
            fi
            sleep 15
          done

          curl -fsSL "${BETTING_KEEPER_URL}/status" | jq -e '.ok == true'
          curl -fsSL "${BETTING_KEEPER_URL}/api/streaming/duel-context" | jq -e '.type == "STREAMING_DUEL_CONTEXT"'
          curl -fsSL "${BETTING_KEEPER_URL}/api/streaming/leaderboard/details" | jq -e '.leaderboard != null and .cycle != null'
          curl -fsSL "${BETTING_KEEPER_URL}/api/perps/markets" | jq -e '.markets != null'
