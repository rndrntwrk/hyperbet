name: Deploy Hyperbet Solana Keeper

on:
  push:
    branches: [main]
    paths:
      - "packages/hyperbet-solana/keeper/**"
      - "packages/market-maker-bot/src/**"
      - "packages/market-maker-bot/package.json"
      - "scripts/**"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/deploy-solana-keeper.yml"
      - "docs/hyperbet-production-deploy.md"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy hyperbet-solana keeper
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment target
        run: |
          deploy_target="production"
          keeper_url="${{ vars.HYPERBET_SOLANA_KEEPER_URL != '' && vars.HYPERBET_SOLANA_KEEPER_URL || 'https://api.hyperbet.win' }}"
          railway_project_id="${{ vars.HYPERBET_SOLANA_RAILWAY_PROJECT_ID != '' && vars.HYPERBET_SOLANA_RAILWAY_PROJECT_ID || 'e5f5ba11-0380-4d71-aa0b-343d89a58c0d' }}"
          railway_environment_id="${{ vars.HYPERBET_SOLANA_RAILWAY_PRODUCTION_ENVIRONMENT_ID != '' && vars.HYPERBET_SOLANA_RAILWAY_PRODUCTION_ENVIRONMENT_ID || '194f3565-ba2f-4c98-87d2-85dfc3a5110b' }}"
          railway_service_id="${{ vars.HYPERBET_SOLANA_RAILWAY_KEEPER_SERVICE_ID != '' && vars.HYPERBET_SOLANA_RAILWAY_KEEPER_SERVICE_ID || '330ea18e-b215-4cf9-9fe2-4bb09fc2ec63' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "staging" ]; then
            deploy_target="staging"
            keeper_url="${{ vars.HYPERBET_SOLANA_KEEPER_STAGING_URL }}"
            railway_project_id="${{ vars.HYPERBET_SOLANA_RAILWAY_STAGING_PROJECT_ID != '' && vars.HYPERBET_SOLANA_RAILWAY_STAGING_PROJECT_ID || vars.HYPERBET_SOLANA_RAILWAY_PROJECT_ID }}"
            railway_environment_id="${{ vars.HYPERBET_SOLANA_RAILWAY_STAGING_ENVIRONMENT_ID }}"
            railway_service_id="${{ vars.HYPERBET_SOLANA_RAILWAY_STAGING_KEEPER_SERVICE_ID }}"
          fi

          if [ -z "${keeper_url}" ] || [ -z "${railway_project_id}" ] || [ -z "${railway_environment_id}" ] || [ -z "${railway_service_id}" ]; then
            echo "Missing Solana keeper staging/prod configuration for ${deploy_target}" >&2
            exit 1
          fi

          echo "DEPLOY_TARGET=${deploy_target}" >> "${GITHUB_ENV}"
          echo "HYPERBET_KEEPER_URL=${keeper_url}" >> "${GITHUB_ENV}"
          echo "RAILWAY_PROJECT_ID=${railway_project_id}" >> "${GITHUB_ENV}"
          echo "RAILWAY_ENVIRONMENT_ID=${railway_environment_id}" >> "${GITHUB_ENV}"
          echo "RAILWAY_KEEPER_SERVICE_ID=${railway_service_id}" >> "${GITHUB_ENV}"

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Detect keeper source changes
        id: keeper_changes
        run: |
          base_ref="${{ github.event.before }}"
          if [ -z "$base_ref" ] || [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          changed_files="$(git diff --name-only "$base_ref" "${{ github.sha }}" || true)"
          printf '%s\n' "$changed_files"

          keeper_source_changed=false
          if printf '%s\n' "$changed_files" | grep -Eq '^packages/hyperbet-solana/keeper/|^packages/market-maker-bot/'; then
            keeper_source_changed=true
          fi

          echo "keeper_source_changed=${keeper_source_changed}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          bash scripts/ci-install-verified.sh root hyperbet-solana-keeper

      - name: Audit deploy env
        run: node --import tsx scripts/ci-env-audit.ts --target=keeper:solana
        env:
          CI_AUDIT_REQUIRE_RUNTIME: "true"
          SOLANA_RPC_URL: https://api.mainnet-beta.solana.com

      - name: Run keeper tests
        run: |
          bun test \
            packages/hyperbet-solana/keeper/src/walletKeys.test.ts \
            packages/hyperbet-solana/keeper/src/modelMarkets.test.ts \
            packages/hyperbet-solana/keeper/src/db.test.ts \
            packages/hyperbet-solana/keeper/src/perpsMath.test.ts

      - name: Smoke test keeper service
        run: |
          PORT=18080 \
          ENABLE_KEEPER_BOT=false \
          SOLANA_RPC_URL=https://api.mainnet-beta.solana.com \
          bun --bun packages/hyperbet-solana/keeper/src/service.ts >/tmp/hyperbet-solana-keeper.log 2>&1 &
          KEEPER_PID=$!
          trap 'kill "$KEEPER_PID" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18080/status | jq -e '.ok == true and .proxies != null' >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/hyperbet-solana-keeper.log
          exit 1

      - name: Install Railway CLI
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        run: bun add -g @railway/cli

      - name: Write Railway keeper context
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        working-directory: packages/hyperbet-solana/keeper
        run: |
          keeper_path="$(pwd)"
          mkdir -p "${HOME}/.railway"
          cat > "${HOME}/.railway/config.json" <<EOF
          {
            "projects": {
              "${keeper_path}": {
                "projectPath": "${keeper_path}",
                "name": "hyperbet",
                "project": "${RAILWAY_PROJECT_ID}",
                "environment": "${RAILWAY_ENVIRONMENT_ID}",
                "environmentName": "${DEPLOY_TARGET}",
                "service": "${RAILWAY_KEEPER_SERVICE_ID}"
              }
            },
            "user": {
              "token": "${RAILWAY_TOKEN}"
            }
          }
          EOF
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Stage market-maker-bot into build context
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        run: |
          mkdir -p packages/hyperbet-solana/market-maker-bot/src
          cp packages/market-maker-bot/package.json packages/hyperbet-solana/market-maker-bot/
          cp -r packages/market-maker-bot/src/ packages/hyperbet-solana/market-maker-bot/src/

      - name: Deploy keeper
        if: steps.keeper_changes.outputs.keeper_source_changed == 'true'
        working-directory: packages/hyperbet-solana/keeper
        run: |
          railway up . \
            --path-as-root \
            --detach \
            --service "${RAILWAY_KEEPER_SERVICE_ID}" \
            --environment "${RAILWAY_ENVIRONMENT_ID}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          CI: "true"

      - name: Verify keeper endpoints
        run: |
          for attempt in $(seq 1 20); do
            status_payload="$(curl -fsSL "${HYPERBET_KEEPER_URL}/status" || true)"
            if [ -n "$status_payload" ] && echo "$status_payload" | jq -e '.ok == true and .proxies.solanaRpc == true and .parsers != null' >/dev/null; then
              break
            fi
            sleep 15
          done

          curl -fsSL "${HYPERBET_KEEPER_URL}/status" | jq -e '.ok == true'
          curl -fsSL "${HYPERBET_KEEPER_URL}/api/arena/prediction-markets/active" | jq -e '.duel != null and .markets != null'
          curl -fsSL "${HYPERBET_KEEPER_URL}/api/keeper/bot-health" | jq -e '.ok == true and .markets != null'
          curl -fsSL "${HYPERBET_KEEPER_URL}/api/streaming/duel-context" | jq -e '.type == "STREAMING_DUEL_CONTEXT"'
          curl -fsSL "${HYPERBET_KEEPER_URL}/api/streaming/leaderboard/details" | jq -e '.leaderboard != null and .cycle != null'
          curl -fsSL "${HYPERBET_KEEPER_URL}/api/perps/markets" | jq -e '.markets != null'
