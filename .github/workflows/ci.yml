name: Hyperbet CI

on:
  push:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/hyperbet-evm/**"
      - "packages/hyperbet-deployments/**"
      - "packages/hyperbet-solana/app/**"
      - "packages/hyperbet-solana/keeper/**"
      - "packages/hyperbet-bsc/app/**"
      - "packages/hyperbet-bsc/keeper/**"
      - "packages/hyperbet-avax/app/**"
      - "packages/hyperbet-avax/keeper/**"
      - "packages/hyperbet-ui/**"
      - "packages/hyperbet-chain-registry/**"
      - "packages/hyperbet-mm-core/**"
      - "packages/evm-contracts/**"
      - "packages/market-maker-bot/**"
      - "packages/simulation-dashboard/**"
      - "scripts/**"
      - ".env.example"
      - "docs/development-setup.md"
      - "docs/hyperbet-production-deploy.md"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/hyperbet-evm/**"
      - "packages/hyperbet-deployments/**"
      - "packages/hyperbet-solana/app/**"
      - "packages/hyperbet-solana/keeper/**"
      - "packages/hyperbet-bsc/app/**"
      - "packages/hyperbet-bsc/keeper/**"
      - "packages/hyperbet-avax/app/**"
      - "packages/hyperbet-avax/keeper/**"
      - "packages/hyperbet-ui/**"
      - "packages/hyperbet-chain-registry/**"
      - "packages/hyperbet-mm-core/**"
      - "packages/evm-contracts/**"
      - "packages/market-maker-bot/**"
      - "packages/simulation-dashboard/**"
      - "scripts/**"
      - ".env.example"
      - "docs/development-setup.md"
      - "docs/hyperbet-production-deploy.md"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:
    inputs:
      run_prediction_market_gates:
        description: "Also run heavyweight prediction-market gate jobs"
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evm-contract-validation:
    name: EVM Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"

      - name: Install root dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Run EVM contract validation
        run: node --import tsx scripts/ci-contracts.ts --target=fast

      - name: Upload EVM contract validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-contract-validation
          path: .ci-artifacts/evm-contract-validation
          if-no-files-found: ignore

  shared-validation:
    name: Shared Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install root dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Audit tracked env files
        run: node --import tsx scripts/ci-env-audit.ts --target=ci-shared

      - name: Validate shared chain registry
        run: |
          bunx tsc --noEmit -p packages/hyperbet-chain-registry/tsconfig.json
          bun test packages/hyperbet-chain-registry/tests/chainRegistry.test.ts

      - name: Validate shared MM core
        run: |
          bun run --cwd packages/hyperbet-mm-core typecheck
          bun run --cwd packages/hyperbet-mm-core test

      - name: Validate market-maker bot
        run: |
          bun run --cwd packages/market-maker-bot typecheck
          bun run --cwd packages/market-maker-bot test

      - name: Validate simulation dashboard
        run: |
          bun run --cwd packages/simulation-dashboard build
          bun run --cwd packages/simulation-dashboard test

  validate-package:
    name: Validate ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: shared-validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: hyperbet-solana
            workspace_target: hyperbet-solana
            audit_target: pages:solana
            build_mode: mainnet-beta
            solana_cluster: mainnet-beta
            avax_chain_id: ""
            avax_gold_clob_address: ""
          - package: hyperbet-bsc
            workspace_target: hyperbet-bsc
            audit_target: pages:bsc
            build_mode: mainnet-beta
            solana_cluster: mainnet-beta
            avax_chain_id: ""
            avax_gold_clob_address: ""
          - package: hyperbet-avax
            workspace_target: hyperbet-avax
            audit_target: app:avax
            build_mode: testnet
            solana_cluster: testnet
            avax_chain_id: ""
            avax_gold_clob_address: ""
    env:
      CF_PAGES_COMMIT_SHA: ${{ github.sha }}
      VITE_GAME_API_URL: https://api.hyperbet.win
      VITE_GAME_WS_URL: wss://api.hyperbet.win/ws
      VITE_SOLANA_CLUSTER: ${{ matrix.solana_cluster }}
      VITE_USE_GAME_RPC_PROXY: "true"
      VITE_USE_GAME_EVM_RPC_PROXY: "true"
      VITE_BSC_CHAIN_ID: "56"
      VITE_BSC_GOLD_CLOB_ADDRESS: "0x443C09B1E7bb7bA3392b02500772B185654A6F33"
      VITE_BASE_CHAIN_ID: "8453"
      VITE_BASE_GOLD_CLOB_ADDRESS: "0xb8c66D6895Bafd1B0027F2c0865865043064437C"
      VITE_AVAX_CHAIN_ID: ${{ matrix.avax_chain_id }}
      VITE_AVAX_GOLD_CLOB_ADDRESS: ${{ matrix.avax_gold_clob_address }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install dependencies
        run: |
          bash scripts/ci-install-verified.sh \
            root \
            ${{ matrix.workspace_target }} \
            ${{ matrix.package }}-app \
            ${{ matrix.package }}-keeper

      - name: Audit build env
        run: node --import tsx scripts/ci-env-audit.ts --target=${{ matrix.audit_target }}

      - name: Type check app
        run: bunx tsc --noEmit -p packages/${{ matrix.package }}/app/tsconfig.json

      - name: Lint app
        run: bun run --cwd packages/${{ matrix.package }}/app lint

      - name: Run app unit tests
        run: |
          if ls packages/${{ matrix.package }}/app/tests/unit/*.test.ts 1>/dev/null 2>&1; then
            bun test packages/${{ matrix.package }}/app/tests/unit/
          else
            echo "No app unit tests found, skipping"
          fi

      - name: Run keeper unit tests
        run: |
          bun test \
            packages/${{ matrix.package }}/keeper/src/walletKeys.test.ts \
            packages/${{ matrix.package }}/keeper/src/modelMarkets.test.ts \
            packages/${{ matrix.package }}/keeper/src/db.test.ts \
            packages/${{ matrix.package }}/keeper/src/perpsMath.test.ts

      - name: Smoke test keeper service
        run: |
          PORT=18080 \
          ENABLE_KEEPER_BOT=false \
          SOLANA_RPC_URL=https://api.mainnet-beta.solana.com \
          bun run --cwd packages/${{ matrix.package }}/keeper service >/tmp/${{ matrix.package }}-keeper.log 2>&1 &
          KEEPER_PID=$!
          trap 'kill "$KEEPER_PID" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18080/status | jq -e '.ok == true and .proxies != null' >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/${{ matrix.package }}-keeper.log
          exit 1

      - name: Build production app
        run: bun run --cwd packages/${{ matrix.package }}/app build --mode ${{ matrix.build_mode }}

      - name: Verify build artifacts
        run: |
          test -f packages/${{ matrix.package }}/app/dist/build-info.json
          if find packages/${{ matrix.package }}/app/dist -name '*.map' | grep -q .; then
            echo "Unexpected source maps in production dist"
            exit 1
          fi
          if grep -R -n "api-key=" packages/${{ matrix.package }}/app/dist; then
            echo "Provider key leak detected in dist"
            exit 1
          fi

  validate-canonical-evm:
    name: Validate hyperbet-evm
    runs-on: ubuntu-latest
    needs: shared-validation
    env:
      CF_PAGES_COMMIT_SHA: ${{ github.sha }}
      VITE_GAME_API_URL: https://api.hyperbet.win
      VITE_GAME_WS_URL: wss://api.hyperbet.win/ws
      VITE_SOLANA_CLUSTER: mainnet-beta
      VITE_USE_GAME_RPC_PROXY: "true"
      VITE_USE_GAME_EVM_RPC_PROXY: "true"
      VITE_BSC_CHAIN_ID: "56"
      VITE_BSC_GOLD_CLOB_ADDRESS: "0x443C09B1E7bb7bA3392b02500772B185654A6F33"
      VITE_BASE_CHAIN_ID: "8453"
      VITE_BASE_GOLD_CLOB_ADDRESS: "0xb8c66D6895Bafd1B0027F2c0865865043064437C"
      VITE_AVAX_CHAIN_ID: ""
      VITE_AVAX_GOLD_CLOB_ADDRESS: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install dependencies
        run: |
          bash scripts/ci-install-verified.sh \
            root \
            hyperbet-evm \
            hyperbet-evm-app \
            hyperbet-evm-keeper

      - name: Validate canonical EVM deployments materialization
        run: bun test packages/hyperbet-evm/tests/deployments.test.ts

      - name: Type check canonical EVM app
        run: bunx tsc --noEmit -p packages/hyperbet-evm/app/tsconfig.json

      - name: Type check canonical EVM keeper
        run: bunx tsc --noEmit -p packages/hyperbet-evm/keeper/tsconfig.json

      - name: Build canonical EVM app
        run: bun run --cwd packages/hyperbet-evm/app build

  evm-contract-proof-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: EVM Contract Proof Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"

      - name: Install dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Run EVM contract proof gate
        run: node --import tsx scripts/ci-contracts.ts --target=proof

      - name: Upload EVM contract proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-contract-proof-gate
          path: .ci-artifacts/evm-contract-proof-gate
          if-no-files-found: ignore

  evm-contract-security-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: EVM Contract Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: python -m pip install --upgrade pip slither-analyzer

      - name: Install dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Run EVM contract security gate
        run: node --import tsx scripts/ci-contracts.ts --target=security

      - name: Upload EVM contract security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-contract-security-gate
          path: .ci-artifacts/evm-contract-security-gate
          if-no-files-found: ignore

  evm-exploit-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: EVM Exploit Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"

      - name: Install dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Audit shared env
        run: node --import tsx scripts/ci-env-audit.ts --target=ci-shared

      - name: Run EVM exploit gate
        run: node --import tsx scripts/ci-gate-scenarios.ts --target=evm

      - name: Upload EVM gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-exploit-gate
          path: .ci-artifacts/evm-exploit-gate
          if-no-files-found: ignore

  solana-exploit-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: Solana Exploit Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"
          install-rust: "true"
          install-solana: "true"
          install-anchor: "true"

      - name: Install dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Audit shared env
        run: node --import tsx scripts/ci-env-audit.ts --target=ci-shared

      - name: Run Solana exploit gate
        run: node --import tsx scripts/ci-gate-scenarios.ts --target=solana

      - name: Upload Solana gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solana-exploit-gate
          path: .ci-artifacts/solana-exploit-gate
          if-no-files-found: ignore

  cross-chain-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: Cross-Chain E2E (${{ matrix.chain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chain: [solana, bsc, avax]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-rust: "true"
          install-foundry: "true"
          install-solana: "true"
          install-anchor: "true"

      - name: Bootstrap workspace
        run: bun run dev:bootstrap

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run Gate 10 local E2E
        run: node --import tsx scripts/ci-gate-e2e.ts --chain=${{ matrix.chain }}

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-chain-e2e-${{ matrix.chain }}
          path: .ci-artifacts/e2e-${{ matrix.chain }}
          if-no-files-found: ignore

  base-add-chain-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prediction_market_gates }}
    name: Base Add-Chain Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"

      - name: Install dependencies
        run: |
          bash scripts/ci-install-verified.sh root hyperbet-bsc-app market-maker-bot

      - name: Audit shared env
        run: node --import tsx scripts/ci-env-audit.ts --target=ci-shared

      - name: Run Base add-chain proof
        run: node --import tsx scripts/ci-gate-base.ts

      - name: Upload Base smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base-add-chain-smoke
          path: .ci-artifacts/base-add-chain-smoke
          if-no-files-found: ignore
