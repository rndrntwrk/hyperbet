name: Hyperbet CI

on:
  push:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/hyperbet-solana/app/**"
      - "packages/hyperbet-solana/keeper/**"
      - "packages/hyperbet-bsc/app/**"
      - "packages/hyperbet-bsc/keeper/**"
      - "packages/hyperbet-avax/app/**"
      - "packages/hyperbet-avax/keeper/**"
      - "packages/hyperbet-ui/**"
      - "packages/hyperbet-chain-registry/**"
      - "packages/hyperbet-mm-core/**"
      - "packages/evm-contracts/**"
      - "packages/market-maker-bot/**"
      - "packages/simulation-dashboard/**"
      - "scripts/**"
      - ".env.example"
      - "docs/development-setup.md"
      - "packages/market-maker-bot/**"
      - "docs/hyperbet-production-deploy.md"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/hyperbet-solana/app/**"
      - "packages/hyperbet-solana/keeper/**"
      - "packages/hyperbet-bsc/app/**"
      - "packages/hyperbet-bsc/keeper/**"
      - "packages/hyperbet-avax/app/**"
      - "packages/hyperbet-avax/keeper/**"
      - "packages/hyperbet-ui/**"
      - "packages/hyperbet-chain-registry/**"
      - "packages/hyperbet-mm-core/**"
      - "packages/evm-contracts/**"
      - "packages/market-maker-bot/**"
      - "packages/simulation-dashboard/**"
      - "scripts/**"
      - ".env.example"
      - "docs/development-setup.md"
      - "packages/market-maker-bot/**"
      - "docs/hyperbet-production-deploy.md"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "bun.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evm-contract-validation:
    name: EVM Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run EVM contract validation
        run: node --import tsx scripts/ci-contracts.ts --target=fast

      - name: Upload EVM contract validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-contract-validation
          path: .ci-artifacts/evm-contract-validation
          if-no-files-found: ignore

  shared-validation:
    name: Shared Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Audit tracked env files
        run: node --import tsx scripts/ci-env-audit.ts --target=ci-shared

      - name: Validate shared chain registry
        run: |
          bunx tsc --noEmit -p packages/hyperbet-chain-registry/tsconfig.json
          bun test packages/hyperbet-chain-registry/tests/chainRegistry.test.ts

      - name: Validate shared MM core
        run: |
          bun run --cwd packages/hyperbet-mm-core typecheck
          bun run --cwd packages/hyperbet-mm-core test

      - name: Validate market-maker bot
        run: |
          bun run --cwd packages/market-maker-bot typecheck
          bun run --cwd packages/market-maker-bot test

      - name: Validate simulation dashboard
        run: |
          bun run --cwd packages/simulation-dashboard build
          bun run --cwd packages/simulation-dashboard test

  validate-package:
    name: Validate ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: shared-validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: hyperbet-solana
            audit_target: pages:solana
            build_mode: mainnet-beta
            solana_cluster: mainnet-beta
            avax_chain_id: ""
            avax_gold_clob_address: ""
          - package: hyperbet-bsc
            audit_target: pages:bsc
            build_mode: mainnet-beta
            solana_cluster: mainnet-beta
            avax_chain_id: ""
            avax_gold_clob_address: ""
          - package: hyperbet-avax
            audit_target: app:avax
            build_mode: testnet
            solana_cluster: testnet
            avax_chain_id: ""
            avax_gold_clob_address: ""
    env:
      CF_PAGES_COMMIT_SHA: ${{ github.sha }}
      VITE_GAME_API_URL: https://api.hyperbet.win
      VITE_GAME_WS_URL: wss://api.hyperbet.win/ws
      VITE_SOLANA_CLUSTER: ${{ matrix.solana_cluster }}
      VITE_USE_GAME_RPC_PROXY: "true"
      VITE_USE_GAME_EVM_RPC_PROXY: "true"
      VITE_BSC_CHAIN_ID: "56"
      VITE_BSC_GOLD_CLOB_ADDRESS: "0x443C09B1E7bb7bA3392b02500772B185654A6F33"
      VITE_BASE_CHAIN_ID: "8453"
      VITE_BASE_GOLD_CLOB_ADDRESS: "0xb8c66D6895Bafd1B0027F2c0865865043064437C"
      VITE_AVAX_CHAIN_ID: ${{ matrix.avax_chain_id }}
      VITE_AVAX_GOLD_CLOB_ADDRESS: ${{ matrix.avax_gold_clob_address }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun install --cwd packages/${{ matrix.package }}/app --frozen-lockfile
          bun install --cwd packages/${{ matrix.package }}/keeper --frozen-lockfile

      - name: Audit build env
        run: node --import tsx scripts/ci-env-audit.ts --target=${{ matrix.audit_target }}

      - name: Type check app
        run: bunx tsc --noEmit -p packages/${{ matrix.package }}/app/tsconfig.json

      - name: Lint app
        run: bun run --cwd packages/${{ matrix.package }}/app lint

      - name: Run app unit tests
        run: |
          if ls packages/${{ matrix.package }}/app/tests/unit/*.test.ts 1>/dev/null 2>&1; then
            bun test packages/${{ matrix.package }}/app/tests/unit/
          else
            echo "No app unit tests found, skipping"
          fi

      - name: Run keeper unit tests
        run: |
          bun test \
            packages/${{ matrix.package }}/keeper/src/walletKeys.test.ts \
            packages/${{ matrix.package }}/keeper/src/modelMarkets.test.ts \
            packages/${{ matrix.package }}/keeper/src/db.test.ts \
            packages/${{ matrix.package }}/keeper/src/perpsMath.test.ts

      - name: Smoke test keeper service
        run: |
          PORT=18080 \
          ENABLE_KEEPER_BOT=false \
          SOLANA_RPC_URL=https://api.mainnet-beta.solana.com \
          bun --bun packages/${{ matrix.package }}/keeper/src/service.ts >/tmp/${{ matrix.package }}-keeper.log 2>&1 &
          KEEPER_PID=$!
          trap 'kill "$KEEPER_PID" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18080/status | jq -e '.ok == true and .proxies != null' >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/${{ matrix.package }}-keeper.log
          exit 1

      - name: Build production app
        run: bun run --cwd packages/${{ matrix.package }}/app build --mode ${{ matrix.build_mode }}

      - name: Verify build artifacts
        run: |
          test -f packages/${{ matrix.package }}/app/dist/build-info.json
          if find packages/${{ matrix.package }}/app/dist -name '*.map' | grep -q .; then
            echo "Unexpected source maps in production dist"
            exit 1
          fi
          if rg -n "api-key=" packages/${{ matrix.package }}/app/dist; then
            echo "Provider key leak detected in dist"
            exit 1
          fi

  market-maker:
    name: Validate market-maker-bot (${{ matrix.chain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chain: solana
          - chain: bsc
          - chain: avax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun install --cwd packages/market-maker-bot --frozen-lockfile

      - name: Run market-maker unit tests
        run: bun run --cwd packages/market-maker-bot test

      - name: Run adversarial suite gate for ${{ matrix.chain }}
        run: bun run --cwd packages/market-maker-bot simulate:adversarial:ci
        env:
          MM_ADVERSARIAL_CHAIN: ${{ matrix.chain }}
          MM_ADVERSARIAL_MIN_PASSES: 6
          MM_ADVERSARIAL_OUTPUT_DIR: packages/market-maker-bot/simulations/ci-${{ matrix.chain }}
