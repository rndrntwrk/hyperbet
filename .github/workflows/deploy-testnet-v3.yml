name: Deploy Testnet v3

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: all
        type: choice
        options:
          - all
          - bsc
          - avax
          - solana

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-testnet-v3:
    name: Deploy Testnet v3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet
        with:
          install-foundry: "true"
          install-rust: "true"
          install-solana: "true"
          install-anchor: "true"

      - name: Install dependencies
        run: bash scripts/ci-install-verified.sh root

      - name: Resolve Stage A runtime env
        env:
          TESTNET_DEPLOYER_PRIVATE_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
          ADMIN_ADDRESS: ${{ secrets.ADMIN_ADDRESS }}
          MARKET_OPERATOR_ADDRESS: ${{ secrets.MARKET_OPERATOR_ADDRESS }}
          REPORTER_ADDRESS: ${{ secrets.REPORTER_ADDRESS }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
          MARKET_MAKER_ADDRESS: ${{ secrets.MARKET_MAKER_ADDRESS }}
          BSC_TESTNET_RPC: ${{ secrets.BSC_TESTNET_RPC }}
          AVAX_FUJI_RPC: ${{ secrets.AVAX_FUJI_RPC }}
          TESTNET_MARKET_OPERATOR_PRIVATE_KEY: ${{ secrets.TESTNET_MARKET_OPERATOR_PRIVATE_KEY }}
          TESTNET_REPORTER_PRIVATE_KEY: ${{ secrets.TESTNET_REPORTER_PRIVATE_KEY }}
          TESTNET_FINALIZER_PRIVATE_KEY: ${{ secrets.TESTNET_FINALIZER_PRIVATE_KEY }}
          TESTNET_CHALLENGER_PRIVATE_KEY: ${{ secrets.TESTNET_CHALLENGER_PRIVATE_KEY }}
          TESTNET_PAUSER_PRIVATE_KEY: ${{ secrets.TESTNET_PAUSER_PRIVATE_KEY }}
          TESTNET_TREASURY_PRIVATE_KEY: ${{ secrets.TESTNET_TREASURY_PRIVATE_KEY }}
          TESTNET_MARKET_MAKER_PRIVATE_KEY: ${{ secrets.TESTNET_MARKET_MAKER_PRIVATE_KEY }}
          TESTNET_SOLANA_DEPLOYER_KEYPAIR: ${{ secrets.TESTNET_SOLANA_DEPLOYER_KEYPAIR }}
          DISPUTE_WINDOW_SECONDS: "3600"
        run: bash scripts/export-stage-a-env.sh

      - name: Prepare deployment artifact directory
        run: mkdir -p .ci-artifacts/testnet-deployment

      - name: Deploy v3 PM contracts to BSC Testnet
        if: ${{ inputs.target == 'all' || inputs.target == 'bsc' }}
        run: bun run --cwd packages/evm-contracts deploy:create2:bsc-testnet

      - name: Copy BSC deployment receipt
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'bsc') }}
        run: |
          if [[ -f packages/evm-contracts/deployments/bscTestnet.json ]]; then
            cp packages/evm-contracts/deployments/bscTestnet.json .ci-artifacts/testnet-deployment/
          fi

      - name: Deploy v3 PM contracts to AVAX Fuji
        if: ${{ inputs.target == 'all' || inputs.target == 'avax' }}
        run: bun run --cwd packages/evm-contracts deploy:create2:avax-fuji

      - name: Copy AVAX deployment receipt
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'avax') }}
        run: |
          if [[ -f packages/evm-contracts/deployments/avaxFuji.json ]]; then
            cp packages/evm-contracts/deployments/avaxFuji.json .ci-artifacts/testnet-deployment/
          fi

      - name: PM-only Solana preflight (devnet)
        if: ${{ inputs.target == 'all' || inputs.target == 'solana' }}
        run: bun run --cwd packages/hyperbet-solana deploy:preflight:devnet:pm

      - name: Deploy PM-only Solana programs to devnet
        if: ${{ inputs.target == 'all' || inputs.target == 'solana' }}
        run: bun run --cwd packages/hyperbet-solana anchor:deploy:pm:devnet

      - name: Initialize and freeze Solana PM config
        if: ${{ inputs.target == 'all' || inputs.target == 'solana' }}
        run: |
          node --import tsx packages/hyperbet-solana/scripts/init-pm-config.ts \
            --cluster devnet \
            --freeze \
            --out .ci-artifacts/testnet-deployment/solana-pm-init-devnet.json

      - name: Upload testnet deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment
          path: .ci-artifacts/testnet-deployment
          if-no-files-found: ignore
