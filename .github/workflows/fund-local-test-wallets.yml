name: Fund Local Test Wallets

on:
  push:
    branches:
      - enoomian/pm16-17-20-21
    paths:
      - .github/workflows/fund-local-test-wallets.yml
      - .github/local-pm-wallets.json
      - scripts/export-local-pm-wallet-env.sh
  workflow_dispatch:

jobs:
  fund-local-test-wallets:
    name: Fund local PM test wallets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Resolve local wallet targets
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const wallets = require("./.github/local-pm-wallets.json");
          const lines = [
            `EVM_KEEPER_ADDRESS=${wallets.evm.keeper}`,
            `EVM_CANARY_ADDRESS=${wallets.evm.canary}`,
            `EVM_MATCHER_ADDRESS=${wallets.evm.matcher}`,
            `SOLANA_KEEPER_ADDRESS=${wallets.solana.keeper}`,
            `SOLANA_CANARY_ADDRESS=${wallets.solana.canary}`,
          ];
          console.log(lines.join("\n"));
          NODE

      - name: Fund BSC Testnet wallets
        env:
          DEPLOYER_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
          RPC: ${{ secrets.BSC_TESTNET_RPC }}
        run: |
          set -euo pipefail
          DEPLOYER_ADDRESS="$(cast wallet address --private-key "$DEPLOYER_KEY")"
          TARGETS=(
            "${EVM_KEEPER_ADDRESS}:0.05ether"
            "${EVM_CANARY_ADDRESS}:0.02ether"
            "${EVM_MATCHER_ADDRESS}:0.02ether"
          )
          NONCE="$(cast nonce "$DEPLOYER_ADDRESS" --rpc-url "$RPC")"
          for i in "${!TARGETS[@]}"; do
            target="${TARGETS[$i]}"
            address="${target%%:*}"
            value="${target##*:}"
            current_nonce="$((NONCE + i))"
            echo "Sending ${value} to ${address} on BSC Testnet (nonce ${current_nonce})"
            cast send "$address" \
              --value "$value" \
              --rpc-url "$RPC" \
              --private-key "$DEPLOYER_KEY" \
              --nonce "$current_nonce"
          done

      - name: Fund AVAX Fuji wallets
        env:
          DEPLOYER_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
          RPC: ${{ secrets.AVAX_FUJI_RPC }}
        run: |
          set -euo pipefail
          DEPLOYER_ADDRESS="$(cast wallet address --private-key "$DEPLOYER_KEY")"
          TARGETS=(
            "${EVM_KEEPER_ADDRESS}:0.20ether"
            "${EVM_CANARY_ADDRESS}:0.05ether"
            "${EVM_MATCHER_ADDRESS}:0.05ether"
          )
          NONCE="$(cast nonce "$DEPLOYER_ADDRESS" --rpc-url "$RPC")"
          for i in "${!TARGETS[@]}"; do
            target="${TARGETS[$i]}"
            address="${target%%:*}"
            value="${target##*:}"
            current_nonce="$((NONCE + i))"
            echo "Sending ${value} to ${address} on AVAX Fuji (nonce ${current_nonce})"
            cast send "$address" \
              --value "$value" \
              --rpc-url "$RPC" \
              --private-key "$DEPLOYER_KEY" \
              --nonce "$current_nonce"
          done

      - name: Verify EVM balances
        env:
          BSC_RPC: ${{ secrets.BSC_TESTNET_RPC }}
          AVAX_RPC: ${{ secrets.AVAX_FUJI_RPC }}
        run: |
          set -euo pipefail
          ADDRESSES=(
            "$EVM_KEEPER_ADDRESS"
            "$EVM_CANARY_ADDRESS"
            "$EVM_MATCHER_ADDRESS"
          )
          echo "=== BSC Testnet ==="
          for address in "${ADDRESSES[@]}"; do
            echo "${address}: $(cast balance "$address" --rpc-url "$BSC_RPC" --ether) tBNB"
          done
          echo
          echo "=== AVAX Fuji ==="
          for address in "${ADDRESSES[@]}"; do
            echo "${address}: $(cast balance "$address" --rpc-url "$AVAX_RPC" --ether) AVAX"
          done
