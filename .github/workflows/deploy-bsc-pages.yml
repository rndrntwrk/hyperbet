name: Deploy Hyperbet BSC Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/hyperbet-bsc/app/**"
      - "packages/hyperbet-ui/**"
      - "scripts/**"
      - ".github/actions/setup-hyperbet/**"
      - ".github/workflows/deploy-bsc-pages.yml"
      - "docs/hyperbet-production-deploy.md"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
          - preview

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.HYPERBET_BSC_DEPLOY_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') }}
    name: Deploy hyperbet-bsc pages
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment target
        run: |
          deploy_target="production"
          pages_project_name="${{ vars.HYPERBET_BSC_PAGES_PROJECT_NAME != '' && vars.HYPERBET_BSC_PAGES_PROJECT_NAME || 'hyperbet-bsc' }}"
          pages_expected_url="${{ vars.HYPERBET_BSC_PAGES_PRODUCTION_URL != '' && vars.HYPERBET_BSC_PAGES_PRODUCTION_URL || 'https://bsc.hyperbet.win' }}"
          api_url="${{ vars.HYPERBET_BSC_KEEPER_URL != '' && vars.HYPERBET_BSC_KEEPER_URL || 'https://bsc-api.hyperbet.win' }}"
          ws_url="${{ vars.HYPERBET_BSC_KEEPER_WS_URL != '' && vars.HYPERBET_BSC_KEEPER_WS_URL || 'wss://bsc-api.hyperbet.win/ws' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "staging" ]; then
            deploy_target="staging"
            pages_project_name="${{ vars.HYPERBET_BSC_PAGES_STAGING_PROJECT_NAME }}"
            pages_expected_url="${{ vars.HYPERBET_BSC_PAGES_STAGING_URL }}"
            api_url="${{ vars.HYPERBET_BSC_KEEPER_STAGING_URL }}"
            ws_url="${{ vars.HYPERBET_BSC_KEEPER_STAGING_WS_URL }}"
          fi

          if [ -z "${pages_project_name}" ]; then
            echo "Missing BSC Pages project name for ${deploy_target}" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.environment }}" != "preview" ]; then
            if [ -z "${pages_expected_url}" ] || [ -z "${api_url}" ] || [ -z "${ws_url}" ]; then
              echo "Missing BSC staging/prod URL configuration for ${deploy_target}" >&2
              exit 1
            fi
          fi

          echo "DEPLOY_TARGET=${deploy_target}" >> "${GITHUB_ENV}"
          echo "PAGES_PROJECT_NAME=${pages_project_name}" >> "${GITHUB_ENV}"
          echo "PAGES_EXPECTED_URL=${pages_expected_url}" >> "${GITHUB_ENV}"
          echo "HYPERBET_API_URL=${api_url}" >> "${GITHUB_ENV}"
          echo "HYPERBET_WS_URL=${ws_url}" >> "${GITHUB_ENV}"
          echo "HYPERBET_BSC_GOLD_CLOB_ADDRESS=${{ vars.HYPERBET_BSC_GOLD_CLOB_ADDRESS != '' && vars.HYPERBET_BSC_GOLD_CLOB_ADDRESS || '0x443C09B1E7bb7bA3392b02500772B185654A6F33' }}" >> "${GITHUB_ENV}"
          echo "HYPERBET_BASE_GOLD_CLOB_ADDRESS=${{ vars.HYPERBET_BASE_GOLD_CLOB_ADDRESS != '' && vars.HYPERBET_BASE_GOLD_CLOB_ADDRESS || '0xb8c66D6895Bafd1B0027F2c0865865043064437C' }}" >> "${GITHUB_ENV}"

      - name: Configure Wrangler auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_WRANGLER_CONFIG_B64: ${{ secrets.CLOUDFLARE_WRANGLER_CONFIG_B64 }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}" >> "${GITHUB_ENV}"
            exit 0
          fi

          if [ -z "${CLOUDFLARE_WRANGLER_CONFIG_B64}" ]; then
            echo "Missing Cloudflare deploy credentials" >&2
            exit 1
          fi

          mkdir -p "${HOME}/.wrangler/config"
          printf '%s' "${CLOUDFLARE_WRANGLER_CONFIG_B64}" | base64 --decode > "${HOME}/.wrangler/config/default.toml"

      - name: Setup Hyperbet toolchain
        uses: ./.github/actions/setup-hyperbet

      - name: Install dependencies
        run: |
          bash scripts/ci-install-verified.sh root hyperbet-bsc-app

      - name: Audit deploy env
        run: node --import tsx scripts/ci-env-audit.ts --target=pages:bsc
        env:
          VITE_GAME_API_URL: ${{ env.HYPERBET_API_URL }}
          VITE_GAME_WS_URL: ${{ env.HYPERBET_WS_URL }}
          VITE_SOLANA_CLUSTER: mainnet-beta
          VITE_USE_GAME_RPC_PROXY: "true"
          VITE_USE_GAME_EVM_RPC_PROXY: "true"
          VITE_BSC_CHAIN_ID: "56"
          VITE_BSC_GOLD_CLOB_ADDRESS: ${{ env.HYPERBET_BSC_GOLD_CLOB_ADDRESS }}
          VITE_BASE_CHAIN_ID: "8453"
          VITE_BASE_GOLD_CLOB_ADDRESS: ${{ env.HYPERBET_BASE_GOLD_CLOB_ADDRESS }}

      - name: Build production app
        run: bun run --cwd packages/hyperbet-bsc/app build --mode mainnet-beta
        env:
          CF_PAGES_COMMIT_SHA: ${{ github.sha }}
          VITE_GAME_API_URL: ${{ env.HYPERBET_API_URL }}
          VITE_GAME_WS_URL: ${{ env.HYPERBET_WS_URL }}
          VITE_SOLANA_CLUSTER: mainnet-beta
          VITE_USE_GAME_RPC_PROXY: "true"
          VITE_USE_GAME_EVM_RPC_PROXY: "true"
          VITE_BSC_CHAIN_ID: "56"
          VITE_BASE_CHAIN_ID: "8453"
          VITE_BSC_GOLD_CLOB_ADDRESS: ${{ env.HYPERBET_BSC_GOLD_CLOB_ADDRESS }}
          VITE_BASE_GOLD_CLOB_ADDRESS: ${{ env.HYPERBET_BASE_GOLD_CLOB_ADDRESS }}

      - name: Verify dist hygiene
        run: |
          test -f packages/hyperbet-bsc/app/dist/build-info.json
          if find packages/hyperbet-bsc/app/dist -name '*.map' | grep -q .; then
            echo "Unexpected source maps in production dist"
            exit 1
          fi
          if grep -R -n "api-key=" packages/hyperbet-bsc/app/dist; then
            echo "Provider key leak detected in dist"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: packages/hyperbet-bsc/app
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "preview" ]; then
            BRANCH="preview-${{ github.run_id }}"
          elif [ "${DEPLOY_TARGET}" = "staging" ]; then
            BRANCH="staging"
          else
            BRANCH="main"
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s | tr -d '"' | cut -c1-100)

          npx wrangler pages deploy dist \
            --project-name="${PAGES_PROJECT_NAME}" \
            --branch="${BRANCH}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${COMMIT_MSG}" \
            --commit-dirty=true \
            --skip-caching

      - name: Verify production build metadata
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment != 'preview' }}
        run: |
          for attempt in $(seq 1 20); do
            payload="$(curl -fsSL "${PAGES_EXPECTED_URL}/build-info.json" || true)"
            if [ -n "$payload" ] && echo "$payload" | jq -e --arg sha "$GITHUB_SHA" '.commitHash == $sha' >/dev/null; then
              echo "build-info.json matches ${GITHUB_SHA}"
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for ${PAGES_EXPECTED_URL}/build-info.json to report ${GITHUB_SHA}"
          exit 1
