[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
cache_path = "cache"
via_ir = true
optimizer = true
optimizer_runs = 200

[dependencies]
"@openzeppelin/" = "node_modules/@openzeppelin/"
"forge-std/" = "lib/forge-std/src/"

