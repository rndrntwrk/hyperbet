[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
fight_oracle = "B5mRCRDJk9BrnH7regMWW5mpTQ8QG1CcCGSnDxMt8hmo"
gold_clob_market = "DYtd7AoyTX2tbmZ8vpC3mxZgqTpyaDei4TFXZukWBJEf"
gold_perps_market = "EoZdHN8U3qWQje48ToxB1SLWjucsFGqcWaRUJQYX3eoT"

[programs.localnet]
fight_oracle = "B5mRCRDJk9BrnH7regMWW5mpTQ8QG1CcCGSnDxMt8hmo"
gold_clob_market = "DYtd7AoyTX2tbmZ8vpC3mxZgqTpyaDei4TFXZukWBJEf"
gold_perps_market = "EoZdHN8U3qWQje48ToxB1SLWjucsFGqcWaRUJQYX3eoT"

[programs.mainnet]
fight_oracle = "B5mRCRDJk9BrnH7regMWW5mpTQ8QG1CcCGSnDxMt8hmo"
gold_clob_market = "DYtd7AoyTX2tbmZ8vpC3mxZgqTpyaDei4TFXZukWBJEf"
gold_perps_market = "EoZdHN8U3qWQje48ToxB1SLWjucsFGqcWaRUJQYX3eoT"

[registry]
url = "https://api.apr.dev"

[test]
startup_wait = 60000

[provider]
# Use localnet for testing (anchor test spins up a local validator)
# For devnet/mainnet deployments, use: anchor deploy --provider.cluster devnet
cluster = "localnet"
wallet = "~/.config/solana/hyperscape-keys/deployer.json"

[workspace]
members = ["programs/*"]
types = "../app/src/idl"

[scripts]
test = "./node_modules/.bin/ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
