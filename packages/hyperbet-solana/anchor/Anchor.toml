[programs.mainnet]
fight_oracle = "6tpRysBFd1yXRipYEYwAw9jxEoVHk15kVXfkDGFLMqcD"
gold_clob_market = "ARVJNJp49VZnkB8QBYZAAFJmufvtVSPhnuuenwwSLwpi"
gold_perps_market = "HbXhqEFevpkfYdZCN6YmJGRmQmj9vsBun2ZHjeeaLRik"

[registry]
url = "https://api.apr.dev"

[test]
startup_wait = 60000

[provider]
# Use localnet for testing (anchor test spins up a local validator)
# For devnet/mainnet deployments, use: anchor deploy --provider.cluster devnet
cluster = "localnet"
wallet = "~/.config/solana/hyperscape-keys/deployer.json"

[workspace]
members = ["programs/*"]
types = "../app/src/idl"

[scripts]
test = "./node_modules/.bin/ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
